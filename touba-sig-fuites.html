<div class="app">

    <ul id="list" class="list"></ul>

  <main>
    <div id="map"></div>

      <div class="p-body">
        <p class="p-desc" id="p-desc"></p>

          <div><dt>Déclarant</dt><dd id="p-rep"></dd></div>
          <div><dt>Coord.</dt><dd id="p-coord"></dd></div>
          <div><dt>Journée</dt><dd id="p-day"></dd></div>

      </div>
      <div class="p-sec">
        <h3 class="p-sec-t">Journal d'événements</h3>
        <ol class="tl" id="p-tl"></ol>
      </div>
      <div class="p-sec">
        <h3 class="p-sec-t">Ajouter un événement</h3>
        <label>Type</label>
        <div class="types" id="p-types"></div>
        <label>Auteur</label>
        <input id="p-author" value="Cellule mission Magal" />
        <label>Commentaire</label>
        <textarea id="p-cmt" placeholder="Détail de l'intervention…"></textarea>
        <button class="submit" onclick="addEv()">Enregistrer l'événement</button>
      </div>
    </div>
  </main>
</div>

const STORAGE = "touba-leak-events-html-v1";
const EM = {
  detected:    {label:"Détectée",     icon:"🟥", color:"#ef4444"},
  assigned:    {label:"Assignée",     icon:"📋", color:"#3b82f6"},
  in_progress: {label:"Intervention", icon:"🔧", color:"#f59e0b"},
  repaired:    {label:"Réparée",      icon:"✅", color:"#22c55e"},
  note:        {label:"Note",         icon:"📝", color:"#94a3b8"}
};

function loadExtra(){ try{return JSON.parse(localStorage.getItem(STORAGE)||"{}")}catch{return{}} }
function saveExtra(s){ localStorage.setItem(STORAGE, JSON.stringify(s)) }
function eventsFor(id){
  const base = (LEAKS.find(l=>l.id===id)||{}).events || [];
  const extra = (loadExtra()[id]||[]);
  return [...base, ...extra].sort((a,b)=>new Date(a.date)-new Date(b.date));
}
function fmt(iso){ return new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}) }

const map = L.map("map").setView([14.86,-15.88], 13);
const layers = {
  "Esri — Imagerie satellite": L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri"}),
  "Esri — Rues":                L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri"}),
  "Esri — Topographique":       L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri"}),
  "Esri — Sombre":              L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}",{maxZoom:16,attribution:"Esri"}),
  "OpenStreetMap":              L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png",{maxZoom:19,attribution:"© OSM"})
};
layers["Esri — Imagerie satellite"].addTo(map);
L.control.layers(layers,null,{position:"topright"}).addTo(map);

let markers = {};
let current = null;

function status(events){
  if (events.some(e=>e.type==="repaired")) return "Réparée";
  if (events.some(e=>e.type==="in_progress")) return "En intervention";
  if (events.some(e=>e.type==="assigned")) return "Assignée";
  return "Détectée";
}
function effectiveStatus(l){
  const evs = eventsFor(l.id);
  return evs.some(e=>e.type==="repaired") ? "repaired" : "detected";
}

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const fd = document.getElementById("f-day").value;
  const fq = document.getElementById("f-q").value;
  const fs = document.getElementById("f-s").value;
  const filtered = LEAKS.filter(l=>{
    if (fd!=="all" && l.day!==fd) return false;
    if (fq!=="all" && l.quartier!==fq) return false;
    if (fs!=="all" && effectiveStatus(l)!==fs) return false;
    if (q){
      const h = (l.quartier+" "+l.description+" "+l.reporter+" "+l.contact).toLowerCase();
      if (!h.includes(q)) return false;
    }
    return true;
  });
  // update markers
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};
  let det=0, rep=0;
  const list = document.getElementById("list");
  list.innerHTML = "";
  filtered.forEach(l=>{
    const st = effectiveStatus(l);
    if (st==="repaired") rep++; else det++;
    const color = st==="repaired" ? "#22c55e" : "#ef4444";
    const m = L.circleMarker([l.lat,l.lng],{radius:7,color:"#0b1220",weight:1.5,fillColor:color,fillOpacity:.9}).addTo(map);
    m.on("click",()=>openPanel(l.id));
    markers[l.id] = m;
    const li = document.createElement("li");
    li.className = "it" + (current===l.id?" act":"");
    li.innerHTML = '<div class="dot '+st+'"></div><div><div class="it-t">#'+l.index+' · '+l.quartier+'</div><div class="it-s">'+l.day+' · '+escapeHtml(l.description)+'</div></div>';
    li.onclick = ()=>openPanel(l.id);
    list.appendChild(li);
  });
  document.getElementById("k-tot").textContent = filtered.length;
  document.getElementById("k-det").textContent = det;
  document.getElementById("k-rep").textContent = rep;
  document.getElementById("count").textContent = filtered.length;
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }

function openPanel(id){
  current = id;
  const l = LEAKS.find(x=>x.id===id);
  if (!l) return;
  document.getElementById("panel").classList.add("open");
  document.getElementById("p-eye").textContent = l.day+" · #"+l.index;
  document.getElementById("p-title").textContent = l.quartier;
  document.getElementById("p-desc").textContent = l.description;
  document.getElementById("p-contact").textContent = l.contact || "—";
  document.getElementById("p-rep").textContent = l.reporter || "—";
  document.getElementById("p-coord").textContent = l.lat.toFixed(5)+", "+l.lng.toFixed(5);
  document.getElementById("p-day").textContent = l.day;
  const link = document.getElementById("p-link");
  if (l.mapsUrl){ link.href = l.mapsUrl; link.style.display="inline-block"; } else { link.style.display="none"; }
  renderTimeline();
  renderTypes();
  map.flyTo([l.lat,l.lng], 17, {duration:.6});
  render();
}
function renderTimeline(){
  const evs = eventsFor(current);
  document.getElementById("p-status").innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:'+EM[evs.some(e=>e.type==="repaired")?"repaired":evs.some(e=>e.type==="in_progress")?"in_progress":evs.some(e=>e.type==="assigned")?"assigned":"detected"].color+';margin-right:6px"></span>'+status(evs);
  const tl = document.getElementById("p-tl");
  tl.innerHTML = "";
  evs.forEach(ev=>{
    const m = EM[ev.type];
    const li = document.createElement("li");
    li.className = "tl-i";
    li.innerHTML = '<span class="tl-d" style="background:'+m.color+'">'+m.icon+'</span><div class="tl-c"><div class="tl-row"><span class="tl-t" style="color:'+m.color+'">'+m.label+'</span><span class="tl-date">'+fmt(ev.date)+'</span></div><div class="tl-a">'+escapeHtml(ev.author)+'</div>'+(ev.comment?'<div class="tl-cm">'+escapeHtml(ev.comment)+'</div>':'')+'</div>';
    tl.appendChild(li);
  });
}
let selType = "note";
function renderTypes(){
  const c = document.getElementById("p-types"); c.innerHTML = "";
  Object.keys(EM).forEach(t=>{
    const b = document.createElement("button");
    b.type="button"; b.className = "pill"+(selType===t?" act":"");
    if (selType===t){ b.style.background = EM[t].color; b.style.borderColor = EM[t].color; }
    b.textContent = EM[t].icon+" "+EM[t].label;
    b.onclick = ()=>{ selType=t; renderTypes(); };
    c.appendChild(b);
  });
}
function addEv(){
  if (!current) return;
  const author = document.getElementById("p-author").value.trim();
  const cmt = document.getElementById("p-cmt").value.trim();
  if (!author) return;
  const store = loadExtra();
  store[current] = store[current] || [];
  store[current].push({id:current+"-"+Date.now(),type:selType,date:new Date().toISOString(),author,comment:cmt||undefined});
  saveExtra(store);
  document.getElementById("p-cmt").value = "";
  renderTimeline(); render();
}
function closePanel(){ current=null; document.getElementById("panel").classList.remove("open"); render(); }

// init filters
const days = [...new Set(LEAKS.map(l=>l.day))].sort();
const qs   = [...new Set(LEAKS.map(l=>l.quartier))].sort();
const dSel = document.getElementById("f-day");
dSel.innerHTML = '<option value="all">Toutes les journées</option>' + days.map(d=>'<option>'+d+'</option>').join("");
const qSel = document.getElementById("f-q");
qSel.innerHTML = '<option value="all">Tous les quartiers</option>' + qs.map(q=>'<option>'+q+'</option>').join("");
["q","f-day","f-q","f-s"].forEach(id=>document.getElementById(id).addEventListener("input",render));

// fit
const bounds = L.latLngBounds(LEAKS.map(l=>[l.lat,l.lng]));
map.fitBounds(bounds,{padding:[40,40],maxZoom:15});
render();
</script>
